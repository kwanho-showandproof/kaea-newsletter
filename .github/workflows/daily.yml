name: 매일 웹진 자동 생성

# 언제 실행할지
on:
  schedule:
    # 매일 KST 오전 10시 = UTC 01:00 (GitHub Actions는 UTC 기준)
    - cron: '0 1 * * *'
  workflow_dispatch:   # Actions 탭에서 수동 실행도 가능

# 생성 결과를 저장소에 자동 저장(커밋)하기 위한 쓰기 권한
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1) 저장소 코드 가져오기
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v4

      # 2) 파이썬 설치
      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3) collect.py 가 필요로 하는 라이브러리 설치
      - name: 라이브러리 설치
        run: pip install requests python-dotenv

      # 4) 뉴스 수집 (STEP 1)
      #    Secrets에 등록한 네이버 키를 환경변수로 전달한다.
      #    코드에는 키가 없고, 여기서 GitHub 금고의 값을 넣어준다.
      - name: 뉴스 수집 실행
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python collect.py

      # ------------------------------------------------------------
      # ※ STEP 2 부정 뉴스 필터링(filter.py)이 들어갈 자리 (지금은 없음)
      #   나중에 여기에 아래 같은 단계를 추가한다:
      #   - name: 부정 뉴스 필터링
      #     env:
      #       ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      #     run: python filter.py
      # ------------------------------------------------------------

      # 5) 웹진 생성 (STEP 3)
      - name: 웹진 생성 실행
        run: python generate.py

      # 6) 생성 결과를 저장소에 반영 (변경 있을 때만 커밋)
      - name: 생성 결과 저장소에 반영
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "변경 사항 없음 - 커밋 생략"
          else
            git commit -m "자동 생성: 웹진 업데이트"
            git push
          fi

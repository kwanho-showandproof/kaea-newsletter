name: 매일 웹진 자동 생성

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 웹진 생성 실행
        run: python generate.py

      - name: 생성 결과 저장소에 반영
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "변경 사항 없음 - 커밋 생략"
          else
            git commit -m "자동 생성: 웹진 업데이트"
            git push
          fi

name: 매일 웹진 자동 생성

# 언제 실행할지
on:
  schedule:
    - cron: '*/5 * * * *'
      timezone: 'Asia/Seoul'
  workflow_dispatch:

# 생성 결과를 저장소에 자동 저장(커밋)하기 위한 쓰기 권한
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1) 저장소 코드 가져오기
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v4

      # 2) 오늘(KST) 웹진이 이미 생성됐는지 확인 (중복 방지)
      #    news/YYYY-MM-DD.html (오늘 KST 날짜)이 이미 있으면 이후 단계를 건너뛴다.
      #    → 5시에 생성됐으면 6시·7시 시도는 수집·필터·생성을 모두 건너뛰어
      #      네이버/Claude API 낭비와 중복 커밋을 막는다.
      #    단, 수동 실행(workflow_dispatch)은 항상 진행한다.
      - name: 오늘 생성 여부 확인
        id: check
        run: |
          TODAY=$(TZ=Asia/Seoul date +%Y-%m-%d)
          echo "오늘(KST): $TODAY"
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] && [ -f "news/$TODAY.html" ]; then
            echo "이미 오늘 웹진이 생성되어 있습니다. 이후 단계를 건너뜁니다."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "오늘 웹진 생성을 진행합니다."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # 3) 파이썬 설치
      - name: 파이썬 설치
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 4) 필요한 라이브러리 설치
      - name: 라이브러리 설치
        if: steps.check.outputs.skip == 'false'
        run: pip install requests python-dotenv anthropic

      # 5) 뉴스 수집 (STEP 1)
      - name: 뉴스 수집 실행
        if: steps.check.outputs.skip == 'false'
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python collect.py

      # 6) 부정 뉴스 필터링 + 요약 (STEP 2)
      - name: 부정 필터링 및 요약 실행
        if: steps.check.outputs.skip == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python filter.py

      # 7) 웹진 + 대시보드 생성 (STEP 3)
      - name: 웹진 생성 실행
        if: steps.check.outputs.skip == 'false'
        run: python generate.py

      # 8) 생성 결과를 저장소에 반영 (변경 있을 때만 커밋)
      - name: 생성 결과 저장소에 반영
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "변경 사항 없음 - 커밋 생략"
          else
            git commit -m "자동 생성: 웹진 업데이트"
            git push
          fi
